services:
  dashboard:
    build:
      context: .
      dockerfile: dashboard_v2/Dockerfile
    ports:
      - "${ASE_HOST_PORT:-8080}:8080"
    environment:
      ASE_DASHBOARD_PORT: "8080"
      ASF_AUDIT_DB: /data/asf_local.db
    volumes:
      - ${ASF_AUDIT_DB_HOST}:/data/asf_local.db
    restart: unless-stopped
